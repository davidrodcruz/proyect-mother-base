name: Health Check

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Check BFF Health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://api.davo.dev/v1/health)
          if [ "$response" -ne 200 ]; then
            echo "BFF health check failed with status $response"
            exit 1
          fi
          echo "BFF health check passed"

      - name: Check Frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://davo.dev)
          if [ "$response" -ne 200 ]; then
            echo "Frontend health check failed with status $response"
            exit 1
          fi
          echo "Frontend health check passed"
